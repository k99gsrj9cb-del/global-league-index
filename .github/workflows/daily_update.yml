name: Daily GLI Update

on:
  schedule:
    # Run at 06:00 UTC daily (covers overnight matches)
    - cron: '0 6 * * *'
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch FBref data
        run: python scripts/fetch_fbref.py

      - name: Build snapshots
        run: python scripts/build_snapshots.py

      - name: Update manifest
        run: python scripts/update_manifest.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: daily data update $(date -u +%Y-%m-%d)"
          git push
